version: '3.8'
services:
  app:
    build: .
    ports:
      - "8182:80"
    env_file:
      - .env
    volumes:
      - public_uploads:/var/www/html/storage/app/public
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: kel2
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  public_uploads: